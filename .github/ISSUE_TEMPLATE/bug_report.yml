name: Bug report
description: Something broke with panel
body:
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - npm
        - pipx
        - git clone
        - other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      placeholder: panel run --panel auto --judge auto -- "..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened
    validations:
      required: true
